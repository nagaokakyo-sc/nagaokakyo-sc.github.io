<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長岡京サッカークラブ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <div class="top-image" id="top">
            <picture>
                <source srcset="images/top-image_mini.jpg" media="(max-width: 768px)">
                <source srcset="images/top-image.webp" type="image/webp">
                <source srcset="images/top-image.jpg" type="image/jpeg">
                <img src="images/top-image.jpg" alt="チームの集合写真">
            </picture>
        </div>
        <section class="home-about">
            <h2>チーム紹介（概要）</h2>
            <p>長岡京市を拠点に活動するシニア向けサッカーチームです。
            <br>現在はO40カテゴリーとO50カテゴリーに分かれて活動しています。
            <br>体験参加も随時募集していますので、ご希望の方はフォームよりお申し込みください。
            </p>
            <a href="about.html">詳しいチーム紹介を見る</a>
        </section>
        <section class="home-news">
            <h2>お知らせ（最新）</h2>
            <div id="top-news"></div>
            <a href="news.html">お知らせ一覧を見る</a>
        </section>
        <section class="home-schedule">
            <h2>スケジュール（直近）</h2>
            <ul id="top-schedule">
                <li>読み込み中...</li>
            </ul>
            <a href="schedule.html" class="more">スケジュール一覧を見る</a>
        </section>
    </main>
    <div id="footer"></div>
    <script src="js/script.js"></script>
</body>
</html>
