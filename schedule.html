<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スケジュール - 長岡京SCシニア</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <section id="schedule">
            <h2>スケジュール</h2>
            <!-- 共通：リスト -->
            <div id="schedule-list">
                <h3>活動スケジュール</h3>
                <ul id="schedule-list-items"></ul>
            </div>
            <!-- PC専用：カレンダー -->
            <div id="schedule-calendar" class="pc-only">
                <h3>チームカレンダー</h3>
                <iframe id="calendar" class="calendar-frame"></iframe>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="js/script.js"></script></body>
</html>
